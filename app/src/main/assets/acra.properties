# ACRA Configuration — loaded automatically from assets/acra.properties
#
# ACRA is only active in release builds (isDebuggable=false in buildType).
# This file is never compiled into the APK as a string literal.
#
# Telegram sender (enabled):
#   BOT_TOKEN and CHAT_ID are injected by CI into BuildConfig at build time.
#   The TelegramSender makes a direct Bot API call — no custom relay server needed.
#
# IMPORTANT: Do NOT add these values manually. CI injects them.
# CI script: echo "acra.telegram.botToken=${TELEGRAM_BOT_TOKEN}" >> acra.properties
# CI script: echo "acra.telegram.chatId=${TELEGRAM_CHAT_ID}" >> acra.properties

# Enable the core ACRA reporter
acra.enable = true

# Core settings
acra.reportFormat = JSON
acra.unsafeDeviceEncryption = false

# --- Sender configuration ---
# Core sender (required — activates all configured senders)
acra.sender = ch.acra.sender.CoreSender

# Telegram sender
acra.telegram.enabled = true
# CI injects: acra.telegram.botToken = 7812592645:AAFH2yTcrFOLXZGPFNmO3_UWNxaBBT4u1m0
# CI injects: acra.telegram.chatId = 8586530555

# HTTP sender (optional — for crash relay / custom backend)
# CI injects: acra.http.uri = https://dashboard.cashlabnyc.com/api/crash
# acra.http.enabled = false
