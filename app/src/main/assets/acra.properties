# ACRA 5.x configuration template — CI injects Telegram credentials at build time.
# This file must NOT contain real secrets in source.
#
# CI replaces the placeholder values below with real secrets:
#   PLACEHOLDER_BOT_TOKEN  → secrets.TELEGRAM_BOT_TOKEN
#   PLACEHOLDER_CHAT_ID     → secrets.TELEGRAM_CHAT_ID
#
# ACRA 5.x correct property names (lowercase, dot-separated):
#   acra.telegram.enabled
#   acra.telegram.botToken
#   acra.telegram.chatId

acra.enable=true
acra.reportFormat=JSON
acra.unsafeDeviceEncryption=false
acra.telegram.enabled=true
acra.telegram.botToken=PLACEHOLDER_BOT_TOKEN
acra.telegram.chatId=PLACEHOLDER_CHAT_ID
