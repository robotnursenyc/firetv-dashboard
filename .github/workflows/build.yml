name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          if [ ! -d "latest" ]; then
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3

      - name: Install required SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-26" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -d "gradle-8.4" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi

      # ── Inject secrets into gradle.properties and acra.properties before build ────
      # Auth token: used in BuildConfig for X-App-Auth header.
      # Telegram creds: used in acra.properties for crash reporting.
      - name: Inject secrets for release builds
        run: |
          # gradle.properties — auth token for BuildConfig
          echo "dashboardAuthToken=${{ secrets.DASHBOARD_AUTH_TOKEN }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "Auth token written to gradle.properties"

          # acra.properties — Telegram crash reporting credentials
          # These are NOT hardcoded in source; CI injects them here.
          cat > $GITHUB_WORKSPACE/app/src/main/assets/acra.properties << 'ACRA_EOF'
          acra.enable=true
          acra.reportFormat=JSON
          acra.unsafeDeviceEncryption=false
          acra.sender=ch.acra.sender.CoreSender
          acra.telegram.enabled=true
          acra.telegram.botToken=${{ secrets.TELEGRAM_BOT_TOKEN }}
          acra.telegram.chatId=${{ secrets.TELEGRAM_CHAT_ID }}
          ACRA_EOF
          echo "acra.properties written (Telegram credentials injected)"

      - name: Build release APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          gradle --version
          gradle assembleRelease --no-daemon 2>&1 | tail -30
          find . -name "*.apk" 2>/dev/null

      - name: Verify release APK was produced
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: app-release.apk not found!"
            exit 1
          fi
          echo "APK size: $(du -h "$APK" | cut -f1)"

      # ── Sign v2-only, strip v1 ─────────────────────────────────────────────
      # Uses a dedicated UPLOAD_KEYSTORE (not the debug keystore) to avoid
      # the "dual-signing with debug key" issue on older FireTV hardware.
      # The keystore + password come from GitHub Secrets.
      - name: Strip v1 signature and re-sign v2-only
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEYSTORE_ALIAS }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          set -e  # Fail fast on any error
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk

          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          APK_FIXED="/tmp/firetv-signed.apk"

          echo "=== Verifying input APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_IN"

          echo "=== Decoding upload keystore ==="
          mkdir -p ~/.android
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > ~/.android/upload.keystore

          echo "=== Re-signing (v1=OFF, v2=ON, v3=OFF) ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --ks ~/.android/upload.keystore \
            --ks-key-alias "$UPLOAD_KEYSTORE_ALIAS" \
            --ks-pass "pass:$UPLOAD_KEYSTORE_PASSWORD" \
            --key-pass "pass:$UPLOAD_KEY_PASSWORD" \
            --out "$APK_FIXED" \
            "$APK_IN"

          echo "=== Verifying output signature ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_FIXED"

          # Sanity-check: v1 must be false, v2 must be true
          VERIFY_OUT=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_FIXED" 2>&1)
          if echo "$VERIFY_OUT" | grep -q "Verified using v1 scheme (JAR signing)"; then
            echo "ERROR: v1 signature still present after strip!"
            exit 1
          fi
          if echo "$VERIFY_OUT" | grep -q "Verified using v2 scheme"; then
            echo "v2 signature verified ✓"
          else
            echo "ERROR: v2 signature not found!"
            exit 1
          fi

          echo "=== Copying signed APK back ==="
          cp "$APK_FIXED" "$APK_IN"

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firetv-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          # Extract version from build output
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts 2>/dev/null || echo "unknown")
          BUILD_NUM=${GITHUB_RUN_NUMBER:-0}

          scp -o StrictHostKeyChecking=no -i /tmp/vps_key \
            "$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk" \
            $VPS_USER@$VPS_HOST:/tmp/firetv-release.apk

          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key $VPS_USER@$VPS_HOST \
            "docker cp /tmp/firetv-release.apk apk-serve:/usr/share/nginx/html/apk/firetv-release.apk && \
             docker exec apk-serve sh -c 'echo \"{\\\"version\\\":\\\"${VERSION_NAME}\\\",\\\"build\\\":${BUILD_NUM},\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"}\" > /usr/share/nginx/html/apk/version.json'"

      - name: Notify Telegram
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ FireTV APK deployed to VPS. Build #${{ github.run_number }}. URL: https://dashboard.cashlabnyc.com/apk/firetv-release.apk"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ FireTV APK build FAILED. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
