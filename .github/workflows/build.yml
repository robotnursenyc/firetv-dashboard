name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4
          build-root-directory: app
          arguments: assembleDebug --no-daemon

      - name: Show APK
        run: |
          find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir missing"

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version || 'v1.0-debug' }}
          release_name: "Fire TV Dashboard ${{ inputs.version || 'v1.0-debug' }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
