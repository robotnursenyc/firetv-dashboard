name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        default: 'v1.0-debug'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4

      - name: Build APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Listing SDK contents:"
          ls $ANDROID_HOME/cmdline-tools/latest/bin/ 2>/dev/null || ls $ANDROID_HOME/tools/bin/ 2>/dev/null || echo "checking other paths"
          find $ANDROID_HOME -name "sdkmanager" 2>/dev/null | head -3
          echo "---"
          cd app
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version || 'v1.0-debug' }}
          release_name: "Fire TV Dashboard ${{ inputs.version || 'v1.0-debug' }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
