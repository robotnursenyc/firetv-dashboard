name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          if [ ! -d "latest" ]; then
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-26" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -d "gradle-8.4" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi

      - name: Build APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          echo "=== CHECKOUT STRUCTURE ==="
          pwd && ls -la
          echo "=== RUNNING GRADLE ==="
          gradle --version
          gradle assembleDebug --no-daemon 2>&1 | tail -40
          echo "=== APK CHECK ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK DIR NOT FOUND"
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firetv-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Delete existing release if exists
        if: success()
        run: |
          TAG="${{ inputs.version || 'v1.0-debug-sdk26' }}"
          if gh release view "$TAG" --repo robotnursenyc/firetv-dashboard >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --repo robotnursenyc/firetv-dashboard
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || 'v1.0-debug-sdk26' }}
          name: Fire TV Dashboard ${{ inputs.version || 'v1.0-debug-sdk26' }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
