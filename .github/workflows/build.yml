name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          # Download command line tools if not present
          if [ ! -d "latest" ]; then
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download and setup Gradle
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          cd /tmp
          if [ ! -d "gradle-8.4" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          gradle --version

      - name: Build APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          cd app
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version || 'v1.0-debug' }}
          release_name: "Fire TV Dashboard ${{ inputs.version || 'v1.0-debug' }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
