name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-root: true
          platforms: android-34,android-26
          build-tools: 34.0.0

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -f "gradle-8.4/bin/gradle" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > $GITHUB_WORKSPACE/local.properties

      - name: Inject secrets for release builds
        run: |
          echo "dashboardAuthToken=${{ secrets.DASHBOARD_AUTH_TOKEN }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "CI_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_WORKSPACE/gradle.properties

      - name: Build release APK
        run: |
          java -version 2>&1
          gradle --version 2>&1
          gradle :app:assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null

      - name: Diagnose build state
        run: |
          echo "=== APK files in release dir ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"
          echo "=== All APKs ==="
          find . -name "*.apk" 2>/dev/null | head -10

      - name: Verify release APK was produced
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: app-release-unsigned.apk not found!"
            ls -la $GITHUB_WORKSPACE/app/build/outputs/apk/release/ 2>/dev/null || echo 'release dir does not exist'
            exit 1
          fi
          echo "Unsigned APK size: $(du -h "$APK" | cut -f1)"

      - name: Strip v1 signature and re-sign v2-only
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEYSTORE_ALIAS }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          echo "=== Decoding keystore ==="
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > /tmp/firetv-upload.jks
          echo "Keystore decoded, size: $(du -h /tmp/firetv-upload.jks | cut -f1)"

          echo "=== Available keys in keystore ==="
          keytool -list -v -keystore /tmp/firetv-upload.jks \
            -storepass "$UPLOAD_KEYSTORE_PASSWORD" 2>&1 | grep -A2 "Alias name" || true

          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_OUT="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"

          echo "=== Verifying input APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_IN" 2>&1 || true

          echo "=== Re-signing v2-only (strip v1) with alias '$UPLOAD_KEYSTORE_ALIAS' ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --ks /tmp/firetv-upload.jks \
            --ks-key-alias "$UPLOAD_KEYSTORE_ALIAS" \
            --ks-pass "pass:$UPLOAD_KEYSTORE_PASSWORD" \
            --key-pass "pass:$UPLOAD_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_IN" 2>&1

          echo "=== Verifying output signature ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1

          VERIFY_OUT=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1)
          if echo "$VERIFY_OUT" | grep -E "Verified using v1 scheme.*: true" > /dev/null 2>&1; then
            echo "ERROR: v1 signature still present!"
            exit 1
          fi
          echo "SUCCESS: APK is signed v2+v3 only"

      - name: Capture signed APK SHA
        id: sha
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          SIGNED_SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          APK_SIZE=$(stat -c %s "$APK")
          echo "SIGNED_APK_SHA=$SIGNED_SHA" >> $GITHUB_ENV
          echo "SIGNED_APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "=== Signed APK ==="
          echo "SHA: $SIGNED_SHA"
          echo "Size: $APK_SIZE bytes"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: FireTV Build #${{ github.run_number }}
          files: ${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release asset URL
        run: |
          echo "=== Release info ==="
          echo "Tag: build-${{ github.run_number }}"
          echo "Expected APK SHA: ${{ env.SIGNED_APK_SHA }}"
          echo "Expected size: ${{ env.SIGNED_APK_SIZE }} bytes"

      # ── Deploy to VPS ────────────────────────────────────────────────────────
      # Strategy: download the Release asset (CDN-backed, always correct file),
      # then deploy via SCP. Release assets are stored on GitHub's CDN and
      # always return the exact file that was uploaded — no artifact deduplication bugs.
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          BUILD_NUM: ${{ github.run_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "=== STEP 1: Download Release asset (CDN-backed, always correct file) ==="
          TMP_APK="/tmp/firetv-release-$(date +%s).apk"

          # softprops/action-gh-release uploads to a URL like:
          # https://github.com/robotnursenyc/firetv-dashboard/releases/download/build-127/firetv-release.apk
          ASSET_URL="https://github.com/$REPO/releases/download/build-$BUILD_NUM/firetv-release.apk"
          echo "Asset URL: $ASSET_URL"

          curl -sSL \
            -H "Authorization: token $GH_TOKEN" \
            -L "$ASSET_URL" \
            -o "$TMP_APK"

          DOWNLOAD_SHA=$(sha256sum "$TMP_APK" | cut -d' ' -f1)
          DOWNLOAD_SIZE=$(stat -c %s "$TMP_APK")
          echo "Downloaded APK size: $DOWNLOAD_SIZE bytes"
          echo "Downloaded APK SHA: $DOWNLOAD_SHA"
          echo "Expected SHA: $SIGNED_APK_SHA"

          if [ "$DOWNLOAD_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "FATAL: Downloaded Release asset SHA doesn't match. CDN returned wrong file."
            exit 1
          fi
          echo "Release asset SHA verified OK."

          echo "=== STEP 2: Verify v2 signature on downloaded APK ==="
          if ! $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$TMP_APK" 2>&1 | grep -q "Verified using v2 scheme"; then
            echo "FATAL: Downloaded APK has no v2 signature"
            exit 1
          fi
          echo "v2 signature verified OK."

          echo "=== STEP 3: Write SSH key ==="
          mkdir -p /tmp/ssh_hermes
          echo "$VPS_SSH_KEY" > /tmp/ssh_hermes/vps_key
          chmod 600 /tmp/ssh_hermes/vps_key
          # Determine home dir for VPS_USER
          if [ "$VPS_USER" = "root" ]; then
            VPS_HOME="/root"
          else
            VPS_HOME="/home/$VPS_USER"
          fi
          echo "VPS user: $VPS_USER, home: $VPS_HOME"

          echo "=== STEP 4: SCP APK to VPS ==="
          scp -o StrictHostKeyChecking=no \
             -i /tmp/ssh_hermes/vps_key \
             "$TMP_APK" \
             "$VPS_USER@$VPS_HOST:$VPS_HOME/firetv-release.apk"
          echo "scp exit: $?"

          echo "=== STEP 5: Verify file on VPS host ==="
          VPS_SHA=$(ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_hermes/vps_key \
              "$VPS_USER@$VPS_HOST" \
              sha256sum "$VPS_HOME/firetv-release.apk" | cut -d' ' -f1)
          echo "VPS host SHA: $VPS_SHA"
          if [ "$VPS_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "FATAL: VPS file SHA doesn't match. SCP corrupted the file."
            exit 1
          fi
          echo "VPS SHA verified OK."

          echo "=== STEP 6: Atomic deploy into container ==="
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_hermes/vps_key \
              "$VPS_USER@$VPS_HOST" \
              "docker cp $VPS_HOME/firetv-release.apk apk-serve:/tmp/firetv-release.apk && \
               docker exec apk-serve sh -c '
                 set -e
                 cp /tmp/firetv-release.apk /usr/share/nginx/html/apk/firetv-release.apk.new
                 chmod 644 /usr/share/nginx/html/apk/firetv-release.apk.new
                 echo {\\\"version\\\":\\\"1.0\\\",\\\"build\\\":$BUILD_NUM,\\\"sha256\\\":\\\"$SIGNED_APK_SHA\\\",\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"} > /usr/share/nginx/html/apk/version.json.new
                 mv /usr/share/nginx/html/apk/firetv-release.apk.new /usr/share/nginx/html/apk/firetv-release.apk
                 mv /usr/share/nginx/html/apk/version.json.new /usr/share/nginx/html/apk/version.json
                 echo FINAL_SHA: && sha256sum /usr/share/nginx/html/apk/firetv-release.apk
                 cat /usr/share/nginx/html/apk/version.json
               '"

          echo "=== Deploy complete ==="
          echo "APK URL: https://dashboard.cashlabnyc.com/apk/firetv-release.apk"
          echo "Version URL: https://dashboard.cashlabnyc.com/apk/version.json"
