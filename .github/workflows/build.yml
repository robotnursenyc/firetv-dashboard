name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-root: true
          platforms: android-34,android-26
          build-tools: 34.0.0

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -f "gradle-8.4/bin/gradle" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > $GITHUB_WORKSPACE/local.properties

      - name: Inject secrets for release builds
        run: |
          echo "dashboardAuthToken=${{ secrets.DASHBOARD_AUTH_TOKEN }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "CI_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_WORKSPACE/gradle.properties

      - name: Build release APK
        run: |
          gradle :app:assembleRelease --no-daemon 2>&1
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"

      - name: Verify release APK was produced
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: app-release-unsigned.apk not found!"
            ls -la $GITHUB_WORKSPACE/app/build/outputs/apk/release/ 2>/dev/null || echo 'release dir does not exist'
            exit 1
          fi
          echo "Unsigned APK size: $(du -h "$APK" | cut -f1)"

      - name: Strip v1 signature and re-sign v2-only
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEYSTORE_ALIAS }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > /tmp/firetv-upload.jks

          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_OUT="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"

          echo "=== Signing v2-only ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --ks /tmp/firetv-upload.jks \
            --ks-key-alias "$UPLOAD_KEYSTORE_ALIAS" \
            --ks-pass "pass:$UPLOAD_KEYSTORE_PASSWORD" \
            --key-pass "pass:$UPLOAD_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_IN" 2>&1

          echo "=== Verifying ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1
          echo ""
          echo "=== Signed APK size ==="
          stat -c %s "$APK_OUT"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1 | grep "Verified using v"

          # Record SHA for deploy step
          SIGNED_SHA=$(sha256sum "$APK_OUT" | cut -d' ' -f1)
          echo "SIGNED_APK_SHA=$SIGNED_SHA" >> $GITHUB_ENV
          echo "SIGNED_APK_SIZE=$(stat -c %s "$APK_OUT")" >> $GITHUB_ENV

      - name: Upload APK as artifact
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: firetv-release-aligned-${{ github.run_number }}
          path: ${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 3

      # ── Deploy to VPS ────────────────────────────────────────────────────────
      # SCP directly from CI runner to VPS. The APK was just built and signed
      # on this same machine — it's the correct file. No artifact storage involved.
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          BUILD_NUM: ${{ github.run_number }}
        run: |
          set -e
          echo "=== Pre-deploy check ==="
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          echo "APK: $APK"
          ls -la "$APK"
          echo "Expected SHA: $SIGNED_APK_SHA"
          ACTUAL_SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          echo "Actual SHA:   $ACTUAL_SHA"
          echo "Expected size: $SIGNED_APK_SIZE"

          if [ "$ACTUAL_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "ERROR: SHA mismatch between signing and deploy steps"
            exit 1
          fi

          # The APK is correct. Now deploy via SCP using a tmp file approach
          # that avoids all heredoc/quoting issues.
          echo "=== Writing SSH key ==="
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          # Add VPS host key automatically
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Determine home dir for VPS_USER
          if [ "$VPS_USER" = "root" ]; then
            VPS_UPLOAD_DIR="/root"
          else
            VPS_UPLOAD_DIR="/home/$VPS_USER"
          fi
          echo "VPS user: $VPS_USER, upload dir: $VPS_UPLOAD_DIR"

          echo "=== SCP APK to VPS ==="
          scp -o StrictHostKeyChecking=no \
             -i ~/.ssh/vps_deploy_key \
             "$APK" \
             "$VPS_USER@$VPS_HOST:$VPS_UPLOAD_DIR/firetv-release.apk"
          echo "scp exit: $?"

          echo "=== Verify on VPS host ==="
          VPS_SHA=$(ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/vps_deploy_key \
              "$VPS_USER@$VPS_HOST" \
              sha256sum "$VPS_UPLOAD_DIR/firetv-release.apk" | cut -d' ' -f1)
          echo "VPS SHA: $VPS_SHA"
          if [ "$VPS_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "FATAL: VPS file SHA mismatch"
            exit 1
          fi

          echo "=== Atomic deploy into container ==="
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/vps_deploy_key \
              "$VPS_USER@$VPS_HOST" \
              "docker cp $VPS_UPLOAD_DIR/firetv-release.apk apk-serve:/tmp/firetv-release.apk && \
               docker exec apk-serve sh -c \
                 \"cp /tmp/firetv-release.apk /usr/share/nginx/html/apk/firetv-release.apk.new && \
                  chmod 644 /usr/share/nginx/html/apk/firetv-release.apk.new && \
                  printf '{\\\"version\\\":\\\"1.0\\\",\\\"build\\\":%s,\\\"sha256\\\":\\\"$SIGNED_APK_SHA\\\",\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"}' $BUILD_NUM > /usr/share/nginx/html/apk/version.json.new && \
                  mv /usr/share/nginx/html/apk/firetv-release.apk.new /usr/share/nginx/html/apk/firetv-release.apk && \
                  mv /usr/share/nginx/html/apk/version.json.new /usr/share/nginx/html/apk/version.json && \
                  echo FINAL_SHA: && sha256sum /usr/share/nginx/html/apk/firetv-release.apk && \
                  cat /usr/share/nginx/html/apk/version.json\""

          echo "=== Deploy complete ==="
          echo "APK: https://dashboard.cashlabnyc.com/apk/firetv-release.apk"
