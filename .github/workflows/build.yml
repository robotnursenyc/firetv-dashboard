name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          if [ ! -d "latest" ]; then
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3

      - name: Install required SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-26" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -d "gradle-8.4" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi

      - name: Build release APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          gradle --version
          gradle assembleRelease --no-daemon 2>&1 | tail -30
          find . -name "*.apk" 2>/dev/null

      - name: Fix APK signatures (strip v1, keep v2 only, re-sign with debug key)
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          # Use apksigner to strip v1 and re-sign v2-only with debug keystore
          # This removes all existing signatures and applies fresh v2-only sig
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out /tmp/fixed.apk \
            "$APK_IN"
          # Verify v2-only
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 /tmp/fixed.apk
          mv /tmp/fixed.apk "$APK_IN"

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firetv-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          scp -o StrictHostKeyChecking=no -i /tmp/vps_key \
            "$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk" \
            $VPS_USER@$VPS_HOST:/tmp/firetv-release.apk
          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key $VPS_USER@$VPS_HOST \
            "docker cp /tmp/firetv-release.apk apk-serve:/usr/share/nginx/html/apk/firetv-release.apk && \
             docker exec apk-serve sh -c 'echo \"{\\\"version\\\":\\\"1.8.1\\\",\\\"build\\\":10,\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"}\" > /usr/share/nginx/html/apk/version.json'"

      - name: Notify Telegram
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ FireTV APK deployed to VPS. URL: https://dashboard.cashlabnyc.com/apk/firetv-release.apk"
