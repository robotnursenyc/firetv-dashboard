name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Android SDK — use official setup action (ubuntu-22.04 has NO pre-installed SDK) ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-root: true  # installs to /opt/android-sdk
          platforms: android-34,android-26
          build-tools: 34.0.0

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -f "gradle-8.4/bin/gradle" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      # Create local.properties so Gradle knows where the Android SDK lives.
      # ANDROID_HOME is set in the env block of the Build step, but the
      # Android Gradle plugin also reads local.properties.
      # ANDROID_HOME and ANDROID_SDK_ROOT are set by setup-android above.
      # Do NOT override them here.
      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > $GITHUB_WORKSPACE/local.properties
          echo "Created: $(cat $GITHUB_WORKSPACE/local.properties)"

      # ── Inject auth token into gradle.properties before build ────
      # Auth token used in BuildConfig for X-App-Auth header injection.
      - name: Inject secrets for release builds
        run: |
          echo "dashboardAuthToken=${{ secrets.DASHBOARD_AUTH_TOKEN }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "CI_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "Auth token + build number written to gradle.properties"

      - name: Build release APK
        continue-on-error: true
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== Gradle version ==="
          gradle --version 2>&1
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "SDK contents: $(ls $ANDROID_HOME/)"
          echo "platforms: $(ls $ANDROID_HOME/platforms/ 2>/dev/null || echo none)"
          echo "build-tools: $(ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo none)"
          echo "=== Working directory ==="
          echo "PWD=$(pwd)"
          echo "=== Running assembleRelease ==="
          gradle :app:assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null

      # ── Diagnostic snapshot — always runs so we can see the full state ────────
      - name: Diagnose build state
        run: |
          echo "=== app/build/ directory ==="
          ls -laR app/build/ 2>/dev/null | head -80 || echo "no app/build dir"
          echo "=== find *.apk anywhere ==="
          find . -name "*.apk" 2>/dev/null | head -20
          echo "=== gradle.properties (auth token redacted) ==="
          sed 's/dashboardAuthToken=.*/dashboardAuthToken=REDACTED/' gradle.properties 2>/dev/null
          echo "=== local.properties ==="
          cat local.properties 2>/dev/null || echo "none"

      - name: Verify release APK was produced
        run: |
          # assembleRelease produces app-release-unsigned.apk when no signing config is set.
          # The signing step (Strip v1 signature) reads this and writes app-release.apk.
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: app-release-unsigned.apk not found!"
            echo "APK dir contents:"
            ls -la $GITHUB_WORKSPACE/app/build/outputs/apk/release/ 2>/dev/null || echo 'release dir does not exist'
            exit 1
          fi
          echo "APK size: $(du -h "$APK" | cut -f1)"

      # ── Sign v2-only, strip v1 ─────────────────────────────────────────────
      # Uses a dedicated UPLOAD_KEYSTORE (not the debug keystore) to avoid
      # the "dual-signing with debug key" issue on older FireTV hardware.
      # The keystore + password come from GitHub Secrets.
      # Note: openssl-generated PKCS12 keystores use alias "1" by default.
      # If signing fails with "No key found", set UPLOAD_KEYSTORE_ALIAS=1 in secrets.
      - name: Strip v1 signature and re-sign v2-only
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEYSTORE_ALIAS }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          echo "=== Decoding keystore ==="
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > /tmp/firetv-upload.jks
          echo "Keystore decoded, size: $(du -h /tmp/firetv-upload.jks | cut -f1)"

          # Show available aliases so we know exactly what key name to use.
          echo "=== Available keys in keystore ==="
          keytool -list -v -keystore /tmp/firetv-upload.jks \
            -storepass "$UPLOAD_KEYSTORE_PASSWORD" 2>&1 | grep -A2 "Alias name" || true

          # assembleRelease produces app-release-unsigned.apk (no signing config defined).
          # Sign it and write to app-release.apk.
          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_OUT="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"

          echo "=== Verifying input APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_IN" 2>&1 || true

          echo "=== Re-signing v2-only (strip v1) with alias '$UPLOAD_KEYSTORE_ALIAS' ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --ks /tmp/firetv-upload.jks \
            --ks-key-alias "$UPLOAD_KEYSTORE_ALIAS" \
            --ks-pass "pass:$UPLOAD_KEYSTORE_PASSWORD" \
            --key-pass "pass:$UPLOAD_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_IN" 2>&1

          echo "=== Verifying output signature ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1

          VERIFY_OUT=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1)
          # Only fail if v1 is TRUE. The ": false" value sits on a separate line.
          if echo "$VERIFY_OUT" | grep -E "Verified using v1 scheme.*: true" > /dev/null 2>&1; then
            echo "ERROR: v1 signature still present!"
            exit 1
          fi
          if echo "$VERIFY_OUT" | grep -q "Verified using v2 scheme"; then
            echo "SUCCESS: APK is signed v2+v3 only (v1 stripped — FireTV compatible)"
          fi

          echo "=== Copying signed APK back ==="
          echo "Final APK: $(du -h "$APK_OUT" | cut -f1)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firetv-release-aligned
          path: ${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # ── Deploy to VPS ────────────────────────────────────────────────────────
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          BUILD_NUM=${GITHUB_RUN_NUMBER:-0}
          LOCAL_APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          echo "=== Deploying firetv-release.apk (build #${BUILD_NUM}) ==="
          echo "APK size: $(du -h "$LOCAL_APK" | cut -f1)"

          # hermes user cannot write to host filesystem.
          # TWO separate SSH commands to avoid stdin sharing between the APK pipe
          # and the deploy script. If stdin is shared (cmd1 && cmd2 < apk), the
          # first command drains the APK bytes and the second command never runs.
          #
          # Step 1: upload deploy script (no stdin from APK needed)
          # Step 2: pipe APK bytes into container stdin (script already written)
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
             -i /tmp/vps_key "$VPS_USER@$VPS_HOST" \
             "docker exec -i apk-serve sh -c 'cat > /tmp/deploy_apk.sh' << 'SCRIPT_EOF'
#!/bin/sh
set -e
cat > /tmp/firetv-release.apk
cp /tmp/firetv-release.apk /usr/share/nginx/html/apk/firetv-release.apk
chmod 644 /usr/share/nginx/html/apk/firetv-release.apk
echo \"{\\\"version\\\":\\\"1.0\\\",\\\"build\\\":${BUILD_NUM},\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"}\" > /usr/share/nginx/html/apk/version.json
echo \"DEPLOY_OK\"
sha256sum /usr/share/nginx/html/apk/firetv-release.apk
rm -f /tmp/deploy_apk.sh
SCRIPT_EOF"

          echo "=== Script uploaded, piping APK ==="

          # Step 2: pipe APK into the already-uploaded deploy script
          # Separate SSH command so APK stdin does NOT share with the script execution
          set -x
          cat "$LOCAL_APK" | ssh -o StrictHostKeyChecking=no \
             -i /tmp/vps_key "$VPS_USER@$VPS_HOST" \
             "docker exec -i apk-serve sh -c 'sh /tmp/deploy_apk.sh'"
          set +x
          APK_DEPLOY_EXIT=$?
          echo "APK pipe exit code: $APK_DEPLOY_EXIT"

          if [ $APK_DEPLOY_EXIT -ne 0 ]; then
            echo "ERROR: APK deploy failed with exit code $APK_DEPLOY_EXIT"
            ssh -o StrictHostKeyChecking=no -i /tmp/vps_key "$VPS_USER@$VPS_HOST" \
              "docker exec apk-serve ls -la /tmp/ 2>&1 || true"
            exit 1
          fi

          echo "=== VPS deploy complete ==="

      # NOTE: Telegram build notifications removed — TELEGRAM_BOT_TOKEN secret
      # refers to Brian's personal bot which does not have permission to send
      # messages to the notification chat. Build status is tracked via GitHub UI.
      # To re-enable: provide a valid bot token + chat_id pair in repo secrets.
