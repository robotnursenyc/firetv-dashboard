name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-root: true
          platforms: android-34,android-26
          build-tools: 34.0.0

      - name: Download Gradle
        run: |
          cd /tmp
          if [ ! -f "gradle-8.4/bin/gradle" ]; then
            wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
            unzip -q gradle.zip
          fi
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > $GITHUB_WORKSPACE/local.properties

      - name: Inject secrets for release builds
        run: |
          echo "dashboardAuthToken=${{ secrets.DASHBOARD_AUTH_TOKEN }}" >> $GITHUB_WORKSPACE/gradle.properties
          echo "CI_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_WORKSPACE/gradle.properties

      - name: Build release APK
        continue-on-error: true
        run: |
          java -version 2>&1
          gradle --version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          gradle :app:assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null

      - name: Diagnose build state
        run: |
          echo "=== APK files in release dir ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "release dir not found"
          echo "=== All APKs ==="
          find . -name "*.apk" 2>/dev/null | head -10

      - name: Verify release APK was produced
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: app-release-unsigned.apk not found!"
            ls -la $GITHUB_WORKSPACE/app/build/outputs/apk/release/ 2>/dev/null || echo 'release dir does not exist'
            exit 1
          fi
          echo "Unsigned APK size: $(du -h "$APK" | cut -f1)"

      - name: Strip v1 signature and re-sign v2-only
        env:
          UPLOAD_KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_B64 }}
          UPLOAD_KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEYSTORE_ALIAS }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          echo "=== Decoding keystore ==="
          echo "$UPLOAD_KEYSTORE_B64" | base64 -d > /tmp/firetv-upload.jks
          echo "Keystore decoded, size: $(du -h /tmp/firetv-upload.jks | cut -f1)"

          echo "=== Available keys in keystore ==="
          keytool -list -v -keystore /tmp/firetv-upload.jks \
            -storepass "$UPLOAD_KEYSTORE_PASSWORD" 2>&1 | grep -A2 "Alias name" || true

          APK_IN="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_OUT="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"

          echo "=== Verifying input APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_IN" 2>&1 || true

          echo "=== Re-signing v2-only (strip v1) with alias '$UPLOAD_KEYSTORE_ALIAS' ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --ks /tmp/firetv-upload.jks \
            --ks-key-alias "$UPLOAD_KEYSTORE_ALIAS" \
            --ks-pass "pass:$UPLOAD_KEYSTORE_PASSWORD" \
            --key-pass "pass:$UPLOAD_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_IN" 2>&1

          echo "=== Verifying output signature ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1

          VERIFY_OUT=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_OUT" 2>&1)
          if echo "$VERIFY_OUT" | grep -E "Verified using v1 scheme.*: true" > /dev/null 2>&1; then
            echo "ERROR: v1 signature still present!"
            exit 1
          fi
          echo "SUCCESS: APK is signed v2+v3 only"

      - name: Capture signed APK SHA and path
        id: sha
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          SIGNED_SHA=$(sha256sum "$APK" | cut -d' ' -f1)
          APK_SIZE=$(stat -c %s "$APK")
          echo "SIGNED_APK_SHA=$SIGNED_SHA" >> $GITHUB_ENV
          echo "SIGNED_APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "SIGNED_APK_PATH=$APK" >> $GITHUB_ENV
          echo "=== Signed APK ==="
          echo "SHA: $SIGNED_SHA"
          echo "Size: $APK_SIZE bytes"
          echo "Path: $APK"

      - name: Upload APK as artifact
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: firetv-release-aligned-${{ github.run_number }}
          path: ${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Verify artifact was uploaded
        run: |
          echo "=== Artifact verification ==="
          echo "Artifact name: firetv-release-aligned-${{ github.run_number }}"
          echo "Expected APK SHA: ${{ env.SIGNED_APK_SHA }}"
          echo "Expected size: ${{ env.SIGNED_APK_SIZE }} bytes"
          echo "Artifact ID: ${{ steps.artifact-upload.outputs.artifact-id }}"

      # ── Deploy to VPS ────────────────────────────────────────────────────────
      # Strategy: download this run's artifact from GitHub API, verify SHA matches,
      # then deploy via SCP. Downloading from GitHub API avoids any runner-local
      # file confusion. We then explicitly SCP the downloaded file, not any
      # workspace file.
      - name: Deploy to VPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARTIFACT_ID: ${{ steps.artifact-upload.outputs.artifact-id }}
          BUILD_NUM: ${{ github.run_number }}
        run: |
          set -e
          mkdir -p /tmp/apk_deploy /tmp/ssh_hermes

          # Write SSH key
          echo "$VPS_SSH_KEY" > /tmp/ssh_hermes/vps_key
          chmod 600 /tmp/ssh_hermes/vps_key

          # Download artifact from GitHub API (not from runner filesystem)
          echo "=== STEP 1: Download artifact from GitHub API ==="
          echo "Artifact ID: $ARTIFACT_ID"
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "0" ]; then
            echo "FATAL: No artifact ID — cannot deploy"
            exit 1
          fi

          curl -sSL \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
            -o /tmp/apk_deploy/artifact.zip

          echo "Artifact zip size: $(du -h /tmp/apk_deploy/artifact.zip | cut -f1)"
          unzip -q /tmp/apk_deploy/artifact.zip -d /tmp/apk_deploy/apk_contents

          APK_FROM_ARTIFACT=$(find /tmp/apk_deploy/apk_contents -name "*.apk" | head -1)
          if [ -z "$APK_FROM_ARTIFACT" ] || [ ! -f "$APK_FROM_ARTIFACT" ]; then
            echo "FATAL: Could not extract APK from artifact zip"
            ls /tmp/apk_deploy/apk_contents/
            exit 1
          fi

          echo "Artifact APK: $APK_FROM_ARTIFACT"
          echo "Artifact APK size: $(du -h "$APK_FROM_ARTIFACT" | cut -f1)"

          # Verify SHA of downloaded artifact
          ARTIFACT_SHA=$(sha256sum "$APK_FROM_ARTIFACT" | cut -d' ' -f1)
          echo "Artifact APK SHA: $ARTIFACT_SHA"
          echo "Expected SHA: $SIGNED_APK_SHA"
          if [ "$ARTIFACT_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "FATAL: Downloaded artifact SHA doesn't match. Storage corruption suspected."
            exit 1
          fi
          echo "Artifact SHA verified OK."

          # Quick signature check on downloaded artifact
          echo "=== STEP 2: Verify artifact APK has v2 signature ==="
          if ! $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_FROM_ARTIFACT" 2>&1 | grep -q "Verified using v2 scheme"; then
            echo "FATAL: Downloaded APK has no v2 signature — not a valid FireTV APK"
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify -v --min-sdk-version 26 "$APK_FROM_ARTIFACT" 2>&1
            exit 1
          fi
          echo "Artifact APK signature verified."

          # SCP downloaded artifact to VPS
          echo "=== STEP 3: SCP APK to VPS ==="
          scp -o StrictHostKeyChecking=no \
             -i /tmp/ssh_hermes/vps_key \
             "$APK_FROM_ARTIFACT" \
             "$VPS_USER@$VPS_HOST:/home/hermes/firetv-release.apk"
          echo "scp exit: $?"

          # Verify file on VPS host
          echo "=== STEP 4: Verify file on VPS host ==="
          VPS_SHA=$(ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_hermes/vps_key \
              "$VPS_USER@$VPS_HOST" \
              sha256sum /home/hermes/firetv-release.apk | cut -d' ' -f1)
          echo "VPS host SHA: $VPS_SHA"
          if [ "$VPS_SHA" != "$SIGNED_APK_SHA" ]; then
            echo "FATAL: VPS file SHA doesn't match. SCP corruption or wrong file."
            exit 1
          fi
          echo "VPS SHA verified OK."

          # Atomic deploy into container
          echo "=== STEP 5: Atomic deploy into container ==="
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_hermes/vps_key \
              "$VPS_USER@$VPS_HOST" \
              "docker exec apk-serve sh -c '
                set -e
                cp /home/hermes/firetv-release.apk /tmp/firetv-release.apk.new
                chmod 644 /tmp/firetv-release.apk.new
                echo {\\\"version\\\":\\\"1.0\\\",\\\"build\\\":$BUILD_NUM,\\\"sha256\\\":\\\"$SIGNED_APK_SHA\\\",\\\"apk_url\\\":\\\"https://dashboard.cashlabnyc.com/apk/firetv-release.apk\\\"} > /tmp/version.json.new
                mv /tmp/firetv-release.apk.new /usr/share/nginx/html/apk/firetv-release.apk
                mv /tmp/version.json.new /usr/share/nginx/html/apk/version.json
                echo DEPLOYED_SHA: && sha256sum /usr/share/nginx/html/apk/firetv-release.apk
                cat /usr/share/nginx/html/apk/version.json
              '"

          echo "=== Deploy complete ==="
          echo "APK URL: https://dashboard.cashlabnyc.com/apk/firetv-release.apk"
          echo "Version URL: https://dashboard.cashlabnyc.com/apk/version.json"
